name: Upstream Sync

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync upstream
        run: |
          git config --global user.name github-actions
          git config --global user.email github-actions@github.com

          git remote add upstream https://github.com/ZhiXuanWang/cf-speed-dns.git

          git fetch upstream

          git checkout main

          git reset --hard upstream/main

          git push origin main --force
